<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>超神スーパー動員管理</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sky:         #5BB8E8;
  --sky-light:   #E8F6FF;
  --sky-mid:     #C0E4F8;
  --sky-dark:    #1A6A9A;
  --white:       #FFFFFF;
  --bg-base:     #F4FAFF;
  --soft-blue:   #D6EEFF;
  --soft-blue2:  #C0E4F8;
  --blue-text:   #1A6A9A;
  --soft-mint:   #C8F0E4;
  --mint-text:   #1A6A50;
  --soft-yellow: #FFF0C0;
  --yellow-text: #806000;
  --soft-lav:    #E0D8FF;
  --lav-text:    #5038A0;
  --soft-pink:   #FFD8E8;
  --pink-text:   #A04060;
  --soft-red:    #FFE0E0;
  --red-text:    #A03030;
  --cream:       #F4FAFF;
  --cream2:      #EAF5FF;
  --cream3:      #D6EEFF;
  --bear:        #C0E4F8;
  --bear-text:   #1A6A9A;
  --soft-pink2:  #C0E4F8;
  --pink-text2:  #1A6A9A;
  --text:        #1A2E3A;
  --muted:       #5A8AA0;
  --border:      #B8D8F0;
  --shadow-color: rgba(30,100,160,0.08);
  --radius:      24px;
  --radius-sm:   16px;
  --radius-xs:   10px;
  --font: 'M PLUS Rounded 1c', sans-serif;
}
html, body { height: 100%; }
body { font-family: var(--font); background: var(--bg-base); color: var(--text); min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; min-height: 100vh; }

/* ===== FLUFFY BG BLOBS ===== */
body::before {
  content: '';
  position: fixed; top: -80px; right: -60px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, #C0E4F8 0%, transparent 70%);
  border-radius: 50%; pointer-events: none; z-index: 0; opacity: 0.5;
}
body::after {
  content: '';
  position: fixed; bottom: -60px; left: -60px;
  width: 240px; height: 240px;
  background: radial-gradient(circle, #D6EEFF 0%, transparent 70%);
  border-radius: 50%; pointer-events: none; z-index: 0; opacity: 0.5;
}

/* ===== HEADER ===== */
.header {
  background: var(--white);
  padding: 14px 16px 12px;
  position: sticky; top: 0; z-index: 100;
  border-bottom: 2px solid var(--border);
  box-shadow: 0 2px 16px rgba(30,100,160,0.10);
}
.header-inner { display: flex; align-items: center; justify-content: space-between; }
.logo-wrap { display: flex; align-items: center; gap: 10px; }
.logo-bear {
  width: 42px; height: 42px;
  background: var(--sky-light); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; box-shadow: 0 2px 10px var(--shadow-color);
  flex-shrink: 0;
}
.logo-text-wrap { line-height: 1.15; }
.logo-main { font-size: 15px; font-weight: 900; color: var(--bear-text); letter-spacing: 0.3px; }
.logo-sub  { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: 0.6px; }
.header-add {
  background: var(--sky); border: none; border-radius: 50px;
  color: white; padding: 9px 18px;
  font-family: var(--font); font-size: 14px; font-weight: 800;
  cursor: pointer; box-shadow: 0 2px 10px rgba(30,100,160,0.20);
  transition: all 0.15s;
}
.header-add:active { transform: scale(0.96); }

/* detail header */
.header-detail-row { display: flex; align-items: center; justify-content: space-between; }
.header-back {
  background: var(--sky-light); border: 2px solid var(--sky-mid);
  color: var(--sky-dark); border-radius: 50px;
  padding: 7px 16px; font-family: var(--font);
  font-size: 13px; font-weight: 800; cursor: pointer; transition: all 0.15s;
}
.header-back:active { background: var(--sky-mid); }
.header-live-name { font-size: 16px; font-weight: 800; color: var(--text); text-align: right; max-width: 65%; }
.header-live-info { font-size: 11px; color: var(--muted); text-align: right; margin-top: 1px; }

/* ===== TABS ===== */
.tab-bar {
  display: flex; background: var(--white);
  border-bottom: 2px solid var(--border);
  position: sticky; top: 70px; z-index: 99;
  overflow-x: auto; scrollbar-width: none;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab {
  flex: 1; padding: 11px 8px; border: none; background: none;
  font-family: var(--font); font-size: 13px; font-weight: 700;
  color: var(--muted); cursor: pointer; transition: all 0.15s;
  white-space: nowrap; border-bottom: 3px solid transparent; margin-bottom: -2px;
}
.tab.active { color: var(--sky-dark); border-bottom-color: var(--sky); }

/* ===== SECTION ===== */
.section { padding: 16px; position: relative; z-index: 1; }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; border: none; border-radius: 50px; cursor: pointer;
  font-family: var(--font); font-weight: 800; transition: all 0.15s;
}
.btn:active { transform: scale(0.96); }
.btn-primary {
  background: var(--sky); color: white;
  padding: 13px 24px; font-size: 15px; width: 100%;
  box-shadow: 0 4px 16px rgba(30,150,220,0.28);
}
.btn-sm  { background: var(--soft-blue2); color: var(--sky-dark); padding: 7px 14px; font-size: 13px; }
.btn-danger-sm { background: var(--soft-pink); color: var(--pink-text); padding: 7px 14px; font-size: 13px; }
.btn-outline { background: var(--white); border: 2px solid var(--border); color: var(--muted); padding: 12px 24px; font-size: 14px; }
.sort-btn {
  background: var(--white); border: 2px solid var(--border); color: var(--muted);
  border-radius: 50px; padding: 5px 12px; font-family: var(--font);
  font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.sort-btn.active { background: var(--sky-light); border-color: var(--sky); color: var(--sky-dark); }

/* ===== FORM ===== */
.input-group { margin-bottom: 13px; }
.input-group label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.3px; }
.input-group input, .input-group select, .input-group textarea {
  width: 100%; padding: 11px 14px; border: 2px solid var(--border);
  border-radius: var(--radius-sm); font-family: var(--font); font-size: 15px;
  color: var(--text); background: var(--white); outline: none;
  transition: border-color 0.15s;
}
.input-group input:focus, .input-group select:focus, .input-group textarea:focus { border-color: var(--sky); }
.input-group textarea { resize: none; min-height: 70px; }
.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ===== SEARCH ===== */
.search-wrap { position: relative; margin-bottom: 10px; }
.search-wrap input {
  width: 100%; padding: 10px 36px 10px 40px; border: 2px solid var(--border);
  border-radius: 50px; font-family: var(--font); font-size: 14px;
  color: var(--text); background: var(--white); outline: none; transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--sky); }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 15px; pointer-events: none; }
.search-clear {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: var(--border); border: none; border-radius: 50%;
  width: 20px; height: 20px; font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; color: var(--muted); font-family: var(--font);
}

/* ===== LIVE CARD ===== */
.live-item {
  background: var(--white); border-radius: var(--radius); border: 2px solid var(--border);
  padding: 16px; margin-bottom: 14px; cursor: pointer;
  transition: all 0.15s; box-shadow: 0 4px 20px var(--shadow-color);
  position: relative; overflow: hidden;
}
.live-item:active { transform: scale(0.98); }
/* パステルアクセント帯 */
.live-item-accent {
  position: absolute; top: 0; left: 0; right: 0; height: 5px;
  background: linear-gradient(90deg, var(--sky), var(--soft-blue2), var(--soft-mint));
  border-radius: var(--radius) var(--radius) 0 0;
}
.live-name { font-size: 17px; font-weight: 800; color: var(--text); margin-top: 6px; }
.live-venue { font-size: 12px; color: var(--muted); margin-top: 3px; }
.live-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }

/* ===== BADGES ===== */
.badge { display: inline-flex; align-items: center; padding: 4px 11px; border-radius: 50px; font-size: 11px; font-weight: 700; }
.badge-pink   { background: var(--soft-pink);   color: var(--pink-text); }
.badge-blue   { background: var(--soft-blue);   color: var(--blue-text); }
.badge-mint   { background: var(--soft-mint);   color: var(--mint-text); }
.badge-yellow { background: var(--soft-yellow); color: var(--yellow-text); }
.badge-lav    { background: var(--soft-lav);    color: var(--lav-text); }
.badge-bear   { background: var(--bear);        color: var(--bear-text); }

/* ===== CHIPS ===== */
.chip {
  display: inline-flex; align-items: center; padding: 5px 13px;
  border-radius: 50px; font-size: 13px; font-weight: 700;
  border: 2px solid var(--border); cursor: pointer; margin: 3px;
  transition: all 0.15s; background: var(--white); color: var(--muted); user-select: none;
}
.chip.selected { background: var(--sky-light); border-color: var(--sky); color: var(--sky-dark); }
.chip:active { transform: scale(0.95); }

/* ===== TICKET CARDS ===== */
.ticket-card {
  background: var(--white); border: 2px solid var(--border);
  border-radius: var(--radius-sm); margin: 6px 0;
  overflow: hidden; box-shadow: 0 2px 12px var(--shadow-color);
}
.ticket-card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; gap: 8px;
}
.ticket-no-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 13px; border-radius: 50px; font-size: 13px; font-weight: 800;
}
.pill-unassigned { background: var(--soft-yellow); color: var(--yellow-text); }
.pill-assigned   { background: var(--soft-mint);   color: var(--mint-text); }
.ticket-assignee { font-size: 12px; color: var(--muted); font-weight: 700; }
.ticket-del { background: var(--soft-pink); border: none; border-radius: 50px; color: var(--pink-text); font-size: 11px; font-weight: 800; padding: 4px 10px; cursor: pointer; font-family: var(--font); }

/* ticket photo area */
.ticket-photo-area { background: var(--bg-base); border-top: 1.5px solid var(--border); display: flex; align-items: center; gap: 10px; padding: 10px 14px; }
.ticket-photo-img { width: 80px; height: 80px; object-fit: cover; display: block; border-radius: 10px; cursor: pointer; flex-shrink: 0; }
.ticket-photo-upload {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; cursor: pointer;
}
.ticket-photo-upload input[type=file] { display: none; }
.upload-label {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer;
}
.upload-icon { font-size: 22px; flex-shrink: 0; }
.upload-text { font-size: 12px; color: var(--muted); font-weight: 700; line-height: 1.4; }
.photo-actions { display: flex; flex-direction: column; gap: 5px; flex: 1; }
.photo-btn {
  background: var(--sky-light); color: var(--sky-dark);
  border: none; border-radius: 50px; padding: 5px 12px;
  font-family: var(--font); font-size: 11px; font-weight: 700; cursor: pointer; text-align: center;
}
.photo-btn-del { background: var(--soft-pink); color: var(--pink-text); }

/* ===== PERSON CARD ===== */
.person-card {
  background: var(--white); border-radius: var(--radius-sm);
  border: 2px solid var(--border); padding: 14px; margin-bottom: 12px;
  box-shadow: 0 2px 12px var(--shadow-color);
}

/* ===== STATS ===== */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-card {
  background: var(--white); border-radius: var(--radius-sm);
  padding: 13px 14px; border: 2px solid var(--border);
  box-shadow: 0 2px 12px var(--shadow-color);
}
.stat-label { font-size: 11px; color: var(--muted); font-weight: 700; margin-bottom: 5px; }
.stat-val { font-size: 21px; font-weight: 800; }
.total-box {
  background: var(--white); border-radius: var(--radius);
  padding: 20px; margin-top: 13px; text-align: center;
  border: 3px solid var(--sky-mid);
  box-shadow: 0 4px 20px rgba(30,150,220,0.15);
  position: relative; overflow: hidden;
}
.total-box::before {
  content: '🐻‍❄️';
  position: absolute; right: 16px; bottom: 10px; font-size: 40px; opacity: 0.12;
}
.total-label { font-size: 13px; color: var(--muted); font-weight: 700; margin-bottom: 4px; }
.total-val { font-size: 36px; font-weight: 900; color: var(--sky-dark); }

/* ===== SUMMARY ROW ===== */
.summary-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1.5px solid var(--border); }
.summary-row:last-child { border-bottom: none; }

/* ===== MISC ===== */
.card { background: var(--white); border-radius: var(--radius); border: 2px solid var(--border); padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 12px var(--shadow-color); }
.empty { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-icon { font-size: 48px; margin-bottom: 10px; }
.empty-text { font-size: 14px; font-weight: 700; }
.no-result { text-align: center; padding: 24px 0; color: var(--muted); font-size: 14px; font-weight: 700; }
.row-flex { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.sec-label { font-size: 12px; font-weight: 700; color: var(--muted); margin: 14px 0 8px; }
.hidden { display: none !important; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(60,40,30,0.32);
  z-index: 200; display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(2px);
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--cream); border-radius: 28px 28px 0 0;
  padding: 20px 16px 36px; width: 100%; max-height: 90vh; overflow-y: auto;
  transform: translateY(30px); transition: transform 0.25s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; color: var(--text); }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.modal-actions .btn { flex: 1; }
.modal-handle { width: 44px; height: 5px; background: var(--border); border-radius: 50px; margin: 0 auto 16px; }

/* ===== FOOTER ===== */
.brand-footer { text-align: center; padding: 20px 16px 36px; color: var(--muted); font-size: 12px; font-weight: 700; position: relative; z-index: 1; }
.brand-footer em { color: var(--sky-dark); font-style: normal; }
</style>
</head>
<body>
<div class="app">

  <!-- LIST VIEW -->
  <div id="view-list">
    <div class="header">
      <div class="header-inner">
        <div class="logo-wrap">
          <div class="logo-bear">🐻‍❄️</div>
          <div class="logo-text-wrap">
            <div class="logo-main">超神スーパー動員管理</div>
          </div>
        </div>
        <button class="header-add" onclick="openAddLive()">＋ 追加</button>
      </div>
    </div>
    <div class="section" id="lives-list"></div>
    <div class="brand-footer">🐻‍❄️ 超神スーパー動員管理 by <a href="https://x.com/tqto25" target="_blank" style="color:var(--sky-dark);text-decoration:none;font-weight:800;">@tqto25</a></div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="view-detail" class="hidden">
    <div class="header">
      <div class="header-detail-row">
        <button class="header-back" onclick="showList()">← もどる</button>
        <div>
          <div class="header-live-name" id="dh-name"></div>
          <div class="header-live-info" id="dh-info"></div>
        </div>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab active" data-tab="tickets" onclick="switchTab('tickets',this)">🎫 チケット</button>
      <button class="tab" data-tab="invite"  onclick="switchTab('invite',this)">👥 招待</button>
      <button class="tab" data-tab="summary" onclick="switchTab('summary',this)">💰 集計</button>
    </div>
    <div id="tab-tickets" class="section"></div>
    <div id="tab-invite"  class="section hidden"></div>
    <div id="tab-summary" class="section hidden"></div>
  </div>

</div>

<!-- MODAL: LIVE -->
<div class="modal-overlay" id="modal-live">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-live-title">🎤 ライブを登録</div>
    <div class="input-group"><label>ライブ名 ✦</label><input id="f-name" placeholder="例：●● Tour Final 2025" /></div>
    <div class="input-group"><label>会場</label><input id="f-venue" placeholder="例：Zepp Tokyo" /></div>
    <div class="input-group"><label>開催日</label><input id="f-date" type="date" /></div>
    <div class="input-row">
      <div class="input-group"><label>OPEN</label><input id="f-open" type="time" /></div>
      <div class="input-group"><label>START</label><input id="f-start" type="time" /></div>
    </div>
    <div class="input-row">
      <div class="input-group"><label>チケット代 (円)</label><input id="f-tprice" type="number" placeholder="0" min="0" /></div>
      <div class="input-group"><label>ドリンク代 (円)</label><input id="f-dprice" type="number" placeholder="0" min="0" /></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-live')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveLive()">保存する</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD TICKET -->
<div class="modal-overlay" id="modal-ticket">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">🎫 チケットを追加</div>
    <div class="input-group"><label>チケット番号 ✦</label><input id="f-tno" placeholder="例：A1" /></div>
    <div style="margin-bottom:10px;">
      <div class="sec-label">まとめて追加（改行で複数入力）</div>
      <textarea id="f-tno-bulk" placeholder="A1&#10;A2&#10;B1&#10;B2"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-ticket')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveTicket()">追加する</button>
    </div>
  </div>
</div>

<!-- MODAL: PERSON -->
<div class="modal-overlay" id="modal-person">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-person-title">👤 招待者を追加</div>
    <div class="input-group"><label>名前 ✦</label><input id="f-pname" placeholder="例：田中さん" /></div>
    <div class="input-group">
      <label>チケット番号（タップで選択）</label>
      <div id="f-chips" style="padding:4px 0;min-height:36px;"></div>
    </div>
    <div class="input-group">
      <label>支払いタイプ</label>
      <select id="f-paytype">
        <option value="both">チケット代 ＋ ドリンク代</option>
        <option value="ticket">チケット代のみ</option>
        <option value="drink">ドリンク代のみ</option>
        <option value="none">なし（無料招待）</option>
      </select>
    </div>
    <div class="input-group"><label>追加費用 (円)</label><input id="f-extra" type="number" placeholder="0" min="0" /></div>
    <div class="input-group"><label>メモ</label><input id="f-memo" placeholder="備考など..." /></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-person')">キャンセル</button>
      <button class="btn btn-primary" onclick="savePerson()">保存する</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'tatochike_v2';
let state = { lives: [] };
let currentLiveId = null, editPersonId = null, editLiveId = null;
let inviteSort = 'added', inviteSearch = '';

function load() {
  try { const d = localStorage.getItem(STORAGE_KEY); if (d) state = JSON.parse(d); } catch(e) {}
  state.lives.forEach(l => {
    if (!('date' in l)) l.date = '';
    l.tickets.forEach(t => { if (!('photo' in t)) t.photo = null; });
  });
}
function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
function currentLive() { return state.lives.find(l => l.id === currentLiveId); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function naturalKey(s) { return String(s).split(/(\d+)/).map((p,i)=>i%2===0?p.toLowerCase():parseInt(p,10)); }
function naturalCompare(a,b) {
  const ak=naturalKey(a.no),bk=naturalKey(b.no);
  for(let i=0;i<Math.max(ak.length,bk.length);i++){
    const av=ak[i]??'',bv=bk[i]??'';
    if(av<bv)return -1;if(av>bv)return 1;
  }
  return 0;
}
function fmtDate(d) {
  if(!d)return'';
  const dt=new Date(d+'T00:00:00');
  return`${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')} (${['日','月','火','水','木','金','土'][dt.getDay()]})`;
}

/* ===== PHOTO UPLOAD ===== */
function handlePhotoUpload(ticketId, input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { alert('5MB以下の画像を選択してください'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const l = currentLive();
    const t = l.tickets.find(x => x.id === ticketId);
    if (t) { t.photo = e.target.result; save(); renderTickets(); }
  };
  reader.readAsDataURL(file);
}
function deletePhoto(ticketId) {
  const l = currentLive();
  const t = l.tickets.find(x => x.id === ticketId);
  if (t) { t.photo = null; save(); renderTickets(); }
}

/* ===== LIVE LIST ===== */
function renderLivesList() {
  const el = document.getElementById('lives-list');
  if (!state.lives.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🐻‍❄️</div><div class="empty-text">ライブを追加してみよう！</div></div>';
    return;
  }
  const sorted = [...state.lives].sort((a,b)=>{
    if(a.date&&b.date)return a.date.localeCompare(b.date);
    if(a.date)return -1;if(b.date)return 1;return 0;
  });
  el.innerHTML = sorted.map(l => {
    const unassigned = l.tickets.filter(t=>!t.assignedTo).length;
    return `<div class="live-item" onclick="openLive('${l.id}')">
      <div class="live-item-accent"></div>
      <div class="live-name">${esc(l.name)}</div>
      ${l.date?`<div style="font-size:13px;color:var(--sky-dark);font-weight:700;margin-top:4px;">📅 ${fmtDate(l.date)}</div>`:''}
      ${l.venue?`<div class="live-venue">📍 ${esc(l.venue)}</div>`:''}
      <div class="live-badges">
        ${l.open?`<span class="badge" style="background:var(--cream2);color:var(--muted);border:1.5px solid var(--border);">OPEN ${l.open}</span>`:''}
        ${l.start?`<span class="badge" style="background:var(--cream2);color:var(--muted);border:1.5px solid var(--border);">START ${l.start}</span>`:''}
        ${l.ticketPrice?`<span class="badge" style="background:var(--cream2);color:var(--muted);border:1.5px solid var(--border);">チケ ¥${fmt(l.ticketPrice)}</span>`:''}
        ${l.drinkPrice?`<span class="badge" style="background:var(--cream2);color:var(--muted);border:1.5px solid var(--border);">ドリ ¥${fmt(l.drinkPrice)}</span>`:''}
        <span class="badge badge-yellow">🎫 ${l.tickets.length}枚</span>
        ${unassigned?`<span class="badge badge-pink">未割当 ${unassigned}</span>`:''}
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn btn-sm" style="flex:1;font-size:12px;padding:6px;" onclick="openEditLive('${l.id}',event)">✏️ 編集</button>
        <button class="btn btn-danger-sm" style="flex:1;font-size:12px;padding:6px;" onclick="deleteLive('${l.id}',event)">🗑 削除</button>
      </div>
    </div>`;
  }).join('');
}

function openAddLive() {

  ['f-name','f-venue','f-date','f-open','f-start','f-tprice','f-dprice'].forEach(id=>document.getElementById(id).value='');

}
function openEditLive(id,e) {

function saveLive() {
  const name=document.getElementById('f-name').value.trim();

/* ===== TICKETS ===== */
function renderTickets() {
  const l=currentLive();
  const sorted=[...l.tickets].sort(naturalCompare);
  const ua=sorted.filter(t=>!t.assignedTo);
  const as=sorted.filter(t=> t.assignedTo);

  let html=`<div class="row-flex" style="margin-bottom:14px;">
    <div style="font-size:16px;font-weight:800;">チケット一覧</div>
    <button class="btn btn-sm" onclick="openModal('modal-ticket')">＋ 追加</button>
  </div>`;

  if(!l.tickets.length){
    html+='<div class="empty"><div class="empty-icon">🎫</div><div class="empty-text">チケットを追加しましょう</div></div>';
  } else {
    const renderTicketCard = (t, assigned) => {
      const p = assigned ? l.persons.find(x=>x.id===t.assignedTo) : null;
      const pillClass = assigned ? 'pill-assigned' : 'pill-unassigned';
      const statusIcon = assigned ? '✓' : '🎫';
      const photoAreaId = 'photo-area-' + t.id;
      const photoContent = t.photo
        ? `<img class="ticket-photo-img" src="${t.photo}" alt="チケット写真" onclick="openPhotoViewer('${t.id}')" style="cursor:pointer;">
           <div class="photo-actions">
             <label class="photo-btn" style="text-align:center;cursor:pointer;">📷 変更<input type="file" accept="image/*" onchange="handlePhotoUpload('${t.id}',this)"></label>
             <button class="photo-btn photo-btn-del" onclick="deletePhoto('${t.id}')">🗑 削除</button>
           </div>`
        : `<div class="ticket-photo-upload">
             <label class="upload-label">
               <span class="upload-icon">📷</span>
               <span class="upload-text">タップして写真を追加（チケット表・裏・QRなど）</span>
               <input type="file" accept="image/*" onchange="handlePhotoUpload('${t.id}',this)">
             </label>
           </div>`;
      return `<div class="ticket-card">
        <div class="ticket-card-header">
          <span class="ticket-no-pill ${pillClass}">${statusIcon} ${esc(t.no)}</span>
          ${p?`<span class="ticket-assignee">→ ${esc(p.name)}</span>`:'<span class="ticket-assignee" style="color:var(--muted);">未割当</span>'}
          <div style="display:flex;gap:6px;margin-left:auto;">
            <button onclick="togglePhotoArea('${photoAreaId}')" style="background:var(--sky-light);color:var(--sky-dark);border:none;border-radius:50px;padding:4px 10px;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;">${t.photo?'📷 写真':'📷'}</button>
            ${!assigned?`<button class="ticket-del" onclick="deleteTicket('${t.id}')">削除</button>`:''}
          </div>
        </div>
        <div id="${photoAreaId}" class="ticket-photo-area hidden">${photoContent}</div>
      </div>`;
    };

    if(ua.length){
      html+=`<div class="sec-label">未割当 (${ua.length}枚)</div>`;
      html+=ua.map(t=>renderTicketCard(t,false)).join('');
    }
    if(as.length){
      html+=`<div class="sec-label" style="margin-top:6px;">割当済 (${as.length}枚)</div>`;
      html+=as.map(t=>renderTicketCard(t,true)).join('');
    }
  }
  document.getElementById('tab-tickets').innerHTML=html;
}

function togglePhotoArea(id){
  const el=document.getElementById(id);
  if(el) el.classList.toggle('hidden');
}

/* photo viewer (fullscreen) */
function openPhotoViewer(ticketId) {
  const l=currentLive();
  const t=l.tickets.find(x=>x.id===ticketId);
  if(!t||!t.photo)return;
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:999;display:flex;align-items:center;justify-content:center;cursor:pointer;';
  const img=document.createElement('img');
  img.src=t.photo;
  img.style.cssText='max-width:95vw;max-height:92vh;border-radius:12px;object-fit:contain;';
  overlay.appendChild(img);
  overlay.onclick=()=>document.body.removeChild(overlay);
  document.body.appendChild(overlay);
}

function saveTicket() {
  const l=currentLive();
  const single=document.getElementById('f-tno').value.trim();
  const bulk=document.getElementById('f-tno-bulk').value.trim();
  const nos=[];if(single)nos.push(single);
  if(bulk)bulk.split('\n').map(s=>s.trim()).filter(Boolean).forEach(s=>nos.push(s));
  if(!nos.length){alert('チケット番号を入力してください');return;}
  let dups=[];
  nos.forEach(no=>{if(l.tickets.find(t=>t.no===no))dups.push(no);else l.tickets.push({id:genId(),no,assignedTo:null,photo:null});});
  if(dups.length)alert(`以下は重複のため追加しませんでした:\n${dups.join(', ')}`);
  save();closeModal('modal-ticket');
  document.getElementById('f-tno').value='';document.getElementById('f-tno-bulk').value='';
  renderTickets();
}
function deleteTicket(id) {
  const l=currentLive(),t=l.tickets.find(x=>x.id===id);
  if(t&&t.assignedTo){alert('割当済のチケットは削除できません');return;}
  if(!confirm('このチケットを削除しますか？'))return;
  l.tickets=l.tickets.filter(x=>x.id!==id);save();renderTickets();
}

/* ===== PERSONS ===== */
function calcCost(p,count,l){
  let c=0;
  if(p.payType==='both')c=count*l.ticketPrice+count*l.drinkPrice;
  else if(p.payType==='ticket')c=count*l.ticketPrice;
  else if(p.payType==='drink')c=count*l.drinkPrice;
  return c+(p.extra||0);
}
function renderInvite() {
  const l=currentLive();
  let persons=[...l.persons];
  const q=inviteSearch.trim().toLowerCase();
  if(q)persons=persons.filter(p=>p.name.toLowerCase().includes(q)||(p.memo||'').toLowerCase().includes(q));
  if(inviteSort==='name')persons.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  else if(inviteSort==='cost')persons.sort((a,b)=>{
    const ac=calcCost(a,l.tickets.filter(t=>t.assignedTo===a.id).length,l);
    const bc=calcCost(b,l.tickets.filter(t=>t.assignedTo===b.id).length,l);
    return bc-ac;
  });
  else if(inviteSort==='assigned'){
    // チケット割当済みが先
    persons.sort((a,b)=>{
      const ah=l.tickets.some(t=>t.assignedTo===a.id)?0:1;
      const bh=l.tickets.some(t=>t.assignedTo===b.id)?0:1;
      return ah-bh;
    });
  }
  else if(inviteSort==='unpaid'){
    // 未払いが先
    persons.sort((a,b)=>{
      const ap=a.paid?1:0, bp=b.paid?1:0;
      return ap-bp;
    });
  }
  let html=`
    <div class="row-flex" style="margin-bottom:10px;">
      <div style="font-size:16px;font-weight:800;">招待者一覧</div>
      <button class="btn btn-sm" onclick="openAddPerson()">＋ 追加</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="名前・メモで検索..." value="${esc(inviteSearch)}" oninput="inviteSearch=this.value;renderInvite()" />
      ${inviteSearch?`<button class="search-clear" onclick="inviteSearch='';renderInvite()">×</button>`:''}
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center;">
      <span style="font-size:12px;color:var(--muted);font-weight:700;">並び替え：</span>
      <button class="sort-btn ${inviteSort==='added'?'active':''}" onclick="inviteSort='added';renderInvite()">追加順</button>
      <button class="sort-btn ${inviteSort==='name'?'active':''}" onclick="inviteSort='name';renderInvite()">名前順</button>
      <button class="sort-btn ${inviteSort==='cost'?'active':''}" onclick="inviteSort='cost';renderInvite()">金額順</button>
      <button class="sort-btn ${inviteSort==='assigned'?'active':''}" onclick="inviteSort='assigned';renderInvite()">🎫 未割当</button>
      <button class="sort-btn ${inviteSort==='unpaid'?'active':''}" onclick="inviteSort='unpaid';renderInvite()">⏳ 未払い</button>
    </div>`;
  if(!l.persons.length){
    html+='<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">招待する人を追加しましょう</div></div>';
  } else if(!persons.length){
    html+=`<div class="no-result">🔍「${esc(inviteSearch)}」に一致する人が見つかりません</div>`;
  } else {
    html+=persons.map(p=>{
      const myTix=[...l.tickets.filter(t=>t.assignedTo===p.id)].sort(naturalCompare);
      const cost=calcCost(p,myTix.length,l);
      const ptLabel={'both':'チケ＋ドリ','ticket':'チケのみ','drink':'ドリのみ','none':'無料'}[p.payType];
      const paid=!!p.paid;
      const cardBg=paid?'#F2FBF7':'var(--white)';
      const cardBorder=paid?'var(--mint-text)':'var(--border)';
      return `<div class="person-card" style="background:${cardBg};border-color:${cardBorder};">
        <div class="row-flex" style="margin-bottom:8px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="font-size:16px;font-weight:800;">👤 ${esc(p.name)}</div>
            ${myTix.length>0?`<span style="background:var(--sky);color:white;border-radius:50px;padding:2px 9px;font-size:11px;font-weight:800;">${myTix.length}枚</span>`:''}
          </div>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-sm" style="font-size:11px;padding:4px 10px;" onclick="openEditPerson('${p.id}')">編集</button>
            <button class="btn btn-danger-sm" style="font-size:11px;padding:4px 10px;" onclick="deletePerson('${p.id}')">削除</button>
          </div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;">
          ${myTix.map(t=>`<span class="badge" style="background:var(--sky-light);color:var(--sky-dark);">🎫 ${esc(t.no)}</span>`).join('')||'<span style="font-size:12px;color:var(--muted);">チケットなし</span>'}
        </div>
        <div style="font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;">
          <span>💳 ${ptLabel}</span><span>🎟 ${myTix.length}枚</span>
          ${p.extra?`<span>＋¥${fmt(p.extra)}</span>`:''}
          ${p.memo?`<span>📝 ${esc(p.memo)}</span>`:''}
        </div>
        <div style="padding-top:10px;border-top:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;">
          <button onclick="togglePaid('${p.id}')" style="display:inline-flex;align-items:center;gap:5px;background:${paid?'var(--soft-mint)':'var(--sky-light)'};color:${paid?'var(--mint-text)':'var(--sky-dark)'};border:2px solid ${paid?'var(--mint-text)':'var(--sky)'};border-radius:50px;padding:6px 14px;font-family:var(--font);font-size:13px;font-weight:800;cursor:pointer;">${paid?'✅ 支払い済み':'⏳ 未払い'}</button>
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="font-size:12px;color:var(--muted);">合計</span>
            <span style="font-size:20px;font-weight:800;color:${paid?'var(--mint-text)':'var(--sky-dark)'};">¥${fmt(cost)}</span>
          </div>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('tab-invite').innerHTML=html;
}
function openAddPerson(){
  editPersonId=null;
  document.getElementById('modal-person-title').textContent='👤 招待者を追加';
  ['f-pname','f-extra','f-memo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-paytype').value='both';
  renderChips(null);openModal('modal-person');
}
function openEditPerson(id){
  editPersonId=id;
  const p=currentLive().persons.find(x=>x.id===id);
  document.getElementById('modal-person-title').textContent='✏️ 招待者を編集';
  document.getElementById('f-pname').value=p.name;
  document.getElementById('f-paytype').value=p.payType;
  document.getElementById('f-extra').value=p.extra||'';
  document.getElementById('f-memo').value=p.memo||'';
  renderChips(id);openModal('modal-person');
}
function renderChips(personId){
  const l=currentLive();
  const mine=personId?l.tickets.filter(t=>t.assignedTo===personId).map(t=>t.id):[];
  const avail=[...l.tickets.filter(t=>!t.assignedTo||(personId&&t.assignedTo===personId))].sort(naturalCompare);
  const el=document.getElementById('f-chips');
  if(!avail.length){el.innerHTML='<span style="font-size:12px;color:var(--muted);">利用可能なチケットがありません</span>';return;}
  el.innerHTML=avail.map(t=>`<span class="chip ${mine.includes(t.id)?'selected':''}" data-tid="${t.id}" onclick="this.classList.toggle('selected')">${esc(t.no)}</span>`).join('');
}
function savePerson(){
  const name=document.getElementById('f-pname').value.trim();
  if(!name){alert('名前を入力してください');return;}
  const l=currentLive();
  const tids=[...document.querySelectorAll('#f-chips .chip.selected')].map(c=>c.dataset.tid);
  const data={name,payType:document.getElementById('f-paytype').value,extra:parseFloat(document.getElementById('f-extra').value)||0,memo:document.getElementById('f-memo').value.trim()};
  if(editPersonId){
    l.tickets.forEach(t=>{if(t.assignedTo===editPersonId)t.assignedTo=null;});
    Object.assign(l.persons.find(x=>x.id===editPersonId),data);
    tids.forEach(tid=>{const t=l.tickets.find(x=>x.id===tid);if(t)t.assignedTo=editPersonId;});
  } else {
    const p={id:genId(),...data};
    l.persons.push(p);
    tids.forEach(tid=>{const t=l.tickets.find(x=>x.id===tid);if(t)t.assignedTo=p.id;});
  }
  save();closeModal('modal-person');renderInvite();
}
function deletePerson(id){
  if(!confirm('この招待者を削除しますか？\n（チケット割り当ても解除されます）'))return;
  const l=currentLive();
  l.tickets.forEach(t=>{if(t.assignedTo===id)t.assignedTo=null;});
  l.persons=l.persons.filter(p=>p.id!==id);
  save();renderInvite();
}
function togglePaid(id){
  const l=currentLive();
  const p=l.persons.find(x=>x.id===id);
  if(p){ p.paid=!p.paid; save(); renderInvite(); }
}

/* ===== SUMMARY ===== */
function renderSummary(){
  const l=currentLive();
  let tT=0,tD=0,tE=0,tC=0;
  l.persons.forEach(p=>{
    const n=l.tickets.filter(t=>t.assignedTo===p.id).length;tC+=n;
    if(p.payType==='both'||p.payType==='ticket')tT+=n*l.ticketPrice;
    if(p.payType==='both'||p.payType==='drink') tD+=n*l.drinkPrice;
    tE+=(p.extra||0);
  });
  const grand=tT+tD+tE,ua=l.tickets.filter(t=>!t.assignedTo).length;
  const paidPersons=l.persons.filter(p=>p.paid);
  const unpaidPersons=l.persons.filter(p=>!p.paid&&l.tickets.some(t=>t.assignedTo===p.id)||(!p.paid&&(p.payType!=='none')));
  const paidTotal=paidPersons.reduce((s,p)=>s+calcCost(p,l.tickets.filter(t=>t.assignedTo===p.id).length,l),0);
  const unpaidTotal=grand-paidTotal;
  const rows=l.persons.map(p=>{
    const myTix=[...l.tickets.filter(t=>t.assignedTo===p.id)].sort(naturalCompare);
    const cost=calcCost(p,myTix.length,l);
    const ptLabel={'both':'チケ＋ドリ','ticket':'チケのみ','drink':'ドリのみ','none':'無料'}[p.payType];
    return`<div class="summary-row">
      <div>
        <div style="font-size:14px;font-weight:800;">${esc(p.name)}</div>
        <div style="font-size:11px;color:var(--muted);">${myTix.map(t=>esc(t.no)).join(', ')||'チケなし'} · ${ptLabel} · ${myTix.length}枚</div>
      </div>
      <div style="text-align:right;"><div style="font-size:17px;font-weight:800;color:var(--sky-dark);">¥${fmt(cost)}</div></div>
    </div>`;
  }).join('');
  document.getElementById('tab-summary').innerHTML=`
    <div style="font-size:16px;font-weight:800;margin-bottom:13px;">全体集計</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">総チケット枚数</div><div class="stat-val" style="color:var(--bear-text);">${tC}<span style="font-size:14px;">枚</span></div></div>
      <div class="stat-card"><div class="stat-label">未割当</div><div class="stat-val" style="color:var(--yellow-text);">${ua}<span style="font-size:14px;">枚</span></div></div>
    </div>
    <div class="stat-grid" style="margin-top:10px;">
      <div class="stat-card"><div class="stat-label">総チケット代</div><div class="stat-val" style="color:var(--sky-dark);">¥${fmt(tT)}</div></div>
      <div class="stat-card"><div class="stat-label">総ドリンク代</div><div class="stat-val" style="color:var(--mint-text);">¥${fmt(tD)}</div></div>
    </div>
    <div class="stat-grid" style="margin-top:10px;">
      <div class="stat-card"><div class="stat-label">総追加費用</div><div class="stat-val" style="color:var(--lav-text);">¥${fmt(tE)}</div></div>
    </div>
    <div class="total-box">
      <div class="total-label">✨ 総合計</div>
      <div class="total-val">¥${fmt(grand)}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;">
      <div class="stat-card" style="border-color:var(--mint-text);background:#F2FBF7;">
        <div class="stat-label">✅ 支払い済み</div>
        <div style="font-size:13px;font-weight:800;color:var(--mint-text);">${paidPersons.length}人</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;">¥${fmt(paidTotal)}</div>
      </div>
      <div class="stat-card" style="border-color:#D4AA00;background:#FFFBEE;">
        <div class="stat-label">⏳ 未払い</div>
        <div style="font-size:13px;font-weight:800;color:var(--yellow-text);">${l.persons.length-paidPersons.length}人</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;">¥${fmt(unpaidTotal)}</div>
      </div>
    </div>
    ${rows?`<div style="font-size:14px;font-weight:800;margin:18px 0 8px;">招待者別内訳</div><div class="card" style="padding:4px 14px;">${rows}</div>`:''}
  `;
}

/* ===== MODAL ===== */
function openModal(id){const el=document.getElementById(id);el.classList.remove('hidden');requestAnimationFrame(()=>el.classList.add('open'));}
function closeModal(id){const el=document.getElementById(id);el.classList.remove('open');setTimeout(()=>el.classList.add('hidden'),220);}
document.querySelectorAll('.modal-overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)closeModal(el.id);});});

load();renderLivesList();
</script>
</body>
</html>
