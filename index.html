<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🎵 Live Manager</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pink: #FF6B9D; --pink-light: #FFE4F0; --pink-dark: #C94B7A;
  --purple: #A855F7; --purple-light: #F3E8FF; --purple-dark: #7C3AED;
  --teal: #0EA5E9; --teal-light: #E0F2FE; --teal-dark: #0369A1;
  --yellow: #F59E0B; --yellow-light: #FEF3C7; --yellow-dark: #B45309;
  --green: #10B981; --green-light: #D1FAE5; --green-dark: #065F46;
  --red: #EF4444; --red-light: #FEE2E2; --red-dark: #991B1B;
  --bg: #FFF5F9; --card: #FFFFFF; --bg2: #FDF2F8;
  --text: #1F1B2E; --muted: #6B7280; --border: #F0D6E8;
  --radius: 18px; --radius-sm: 12px; --radius-xs: 8px;
  --font: 'M PLUS Rounded 1c', sans-serif;
  --shadow: 0 2px 12px rgba(168,85,247,0.10);
  --shadow-lg: 0 8px 32px rgba(168,85,247,0.18);
}
html, body { height: 100%; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

.app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

/* HEADER */
.header {
  background: linear-gradient(135deg, #FF6B9D 0%, #A855F7 100%);
  padding: 18px 16px 14px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(168,85,247,0.25);
}
.header-row { display: flex; align-items: center; justify-content: space-between; }
.header-back { background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.35); color: white; border-radius: 50px; padding: 6px 14px; font-family: var(--font); font-size: 13px; font-weight: 700; cursor: pointer; }
.header-title { font-size: 20px; font-weight: 800; color: white; letter-spacing: 0.3px; }
.header-sub { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 1px; }
.header-add { background: rgba(255,255,255,0.22); border: 1.5px solid rgba(255,255,255,0.4); color: white; border-radius: 50px; padding: 8px 16px; font-family: var(--font); font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
.header-add:active { background: rgba(255,255,255,0.35); }

/* TABS */
.tab-bar {
  display: flex; background: white; border-bottom: 2px solid var(--border);
  position: sticky; top: 72px; z-index: 99; overflow-x: auto;
  scrollbar-width: none;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab { flex: 1; padding: 11px 8px; border: none; background: none; font-family: var(--font); font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; border-bottom: 3px solid transparent; margin-bottom: -2px; }
.tab.active { color: var(--purple-dark); border-bottom-color: var(--purple); }

/* CONTENT */
.section { padding: 16px; flex: 1; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: none; border-radius: 50px; cursor: pointer; font-family: var(--font); font-weight: 700; transition: all 0.15s; }
.btn:active { transform: scale(0.96); }
.btn-primary { background: linear-gradient(135deg, var(--pink), var(--purple)); color: white; padding: 13px 24px; font-size: 15px; width: 100%; box-shadow: 0 4px 14px rgba(255,107,157,0.38); }
.btn-sm { background: var(--purple-light); color: var(--purple-dark); padding: 7px 14px; font-size: 13px; }
.btn-teal-sm { background: var(--teal-light); color: var(--teal-dark); padding: 7px 14px; font-size: 13px; }
.btn-danger-sm { background: var(--red-light); color: var(--red-dark); padding: 7px 14px; font-size: 13px; }
.btn-outline { background: white; border: 1.5px solid var(--border); color: var(--muted); padding: 12px 24px; font-size: 14px; }

/* FORM */
.input-group { margin-bottom: 13px; }
.input-group label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.3px; }
.input-group input, .input-group select, .input-group textarea {
  width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); font-family: var(--font); font-size: 15px; color: var(--text);
  background: var(--bg); outline: none; transition: border-color 0.15s, background 0.15s;
}
.input-group input:focus, .input-group select:focus, .input-group textarea:focus { border-color: var(--pink); background: white; }
.input-group textarea { resize: none; min-height: 70px; }
.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* CARDS */
.card { background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }

/* LIVE ITEMS */
.live-item { background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border); padding: 15px 16px; margin-bottom: 11px; cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow); }
.live-item:active { transform: scale(0.98); box-shadow: none; }
.live-name { font-size: 17px; font-weight: 800; }
.live-venue { font-size: 12px; color: var(--muted); margin-top: 3px; }
.live-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }

/* BADGES */
.badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 50px; font-size: 11px; font-weight: 700; }
.badge-pink { background: var(--pink-light); color: var(--pink-dark); }
.badge-purple { background: var(--purple-light); color: var(--purple-dark); }
.badge-teal { background: var(--teal-light); color: var(--teal-dark); }
.badge-green { background: var(--green-light); color: var(--green-dark); }
.badge-yellow { background: var(--yellow-light); color: var(--yellow-dark); }
.badge-red { background: var(--red-light); color: var(--red-dark); }

/* CHIPS */
.chip { display: inline-flex; align-items: center; padding: 5px 12px; border-radius: 50px; font-size: 13px; font-weight: 700; border: 1.5px solid var(--border); cursor: pointer; margin: 3px; transition: all 0.15s; background: white; color: var(--muted); user-select: none; }
.chip.selected { background: var(--purple-light); border-color: var(--purple); color: var(--purple-dark); }
.chip:active { transform: scale(0.95); }

/* TICKETS */
.ticket-pill { display: inline-flex; align-items: center; gap: 3px; padding: 5px 11px; border-radius: 50px; font-size: 12px; font-weight: 700; margin: 3px; }
.ticket-unassigned { background: var(--yellow-light); color: var(--yellow-dark); }
.ticket-assigned { background: var(--green-light); color: var(--green-dark); }
.ticket-del { background: none; border: none; cursor: pointer; color: inherit; font-size: 13px; padding: 0 0 0 2px; opacity: 0.6; }

/* PERSON CARD */
.person-card { background: var(--bg2); border-radius: var(--radius-sm); border: 1.5px solid var(--border); padding: 14px; margin-bottom: 11px; }
.person-name { font-size: 16px; font-weight: 800; }

/* STATS */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-card { background: white; border-radius: var(--radius-sm); padding: 13px 14px; border: 1.5px solid var(--border); box-shadow: var(--shadow); }
.stat-label { font-size: 11px; color: var(--muted); font-weight: 700; margin-bottom: 5px; }
.stat-val { font-size: 21px; font-weight: 800; color: var(--text); }
.total-box { background: linear-gradient(135deg, var(--pink-light), var(--purple-light)); border-radius: var(--radius); padding: 18px; margin-top: 13px; border: 1.5px solid #E9D5FF; }
.total-label { font-size: 13px; color: var(--purple-dark); font-weight: 700; margin-bottom: 4px; }
.total-val { font-size: 32px; font-weight: 800; color: var(--purple-dark); }

/* EMPTY */
.empty { text-align: center; padding: 36px 20px; color: var(--muted); }
.empty-icon { font-size: 44px; margin-bottom: 10px; }
.empty-text { font-size: 14px; }

/* ROW */
.row-flex { display: flex; align-items: center; justify-content: space-between; gap: 8px; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(31,27,46,0.48); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: white; border-radius: 24px 24px 0 0; padding: 20px 16px 36px; width: 100%; max-height: 90vh; overflow-y: auto; transform: translateY(30px); transition: transform 0.25s; }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.modal-actions .btn { flex: 1; }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 50px; margin: 0 auto 16px; }

/* DIVIDER */
.divider { height: 1px; background: var(--border); margin: 12px 0; }

/* SECTION LABEL */
.sec-label { font-size: 12px; font-weight: 700; color: var(--muted); margin: 12px 0 7px; letter-spacing: 0.3px; }

.hidden { display: none !important; }

/* PERSON SUMMARY ROW */
.summary-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--border); }
.summary-row:last-child { border-bottom: none; }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- VIEW: LIVE LIST -->
  <div id="view-list">
    <div class="header">
      <div class="header-row">
        <div>
          <div style="font-size:11px;color:rgba(255,255,255,0.75);">🎵 ライブ管理アプリ</div>
          <div class="header-title">My Lives</div>
        </div>
        <button class="header-add" onclick="openAddLive()">＋ ライブ追加</button>
      </div>
    </div>
    <div class="section" id="lives-list"></div>
  </div>

  <!-- VIEW: LIVE DETAIL -->
  <div id="view-detail" class="hidden">
    <div class="header">
      <div class="header-row">
        <button class="header-back" onclick="showList()">← 一覧</button>
        <div style="text-align:right;">
          <div class="header-title" id="dh-name"></div>
          <div class="header-sub" id="dh-info"></div>
        </div>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab active" data-tab="tickets" onclick="switchTab('tickets',this)">🎫 チケット</button>
      <button class="tab" data-tab="invite" onclick="switchTab('invite',this)">👥 招待</button>
      <button class="tab" data-tab="summary" onclick="switchTab('summary',this)">📊 集計</button>
    </div>
    <div id="tab-tickets" class="section"></div>
    <div id="tab-invite" class="section hidden"></div>
    <div id="tab-summary" class="section hidden"></div>
  </div>

</div>

<!-- MODAL: ADD/EDIT LIVE -->
<div class="modal-overlay" id="modal-live">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-live-title">🎤 ライブを登録</div>
    <div class="input-group"><label>ライブ名 ✦</label><input id="f-name" placeholder="例：●● Tour Final 2025" /></div>
    <div class="input-group"><label>会場</label><input id="f-venue" placeholder="例：Zepp Tokyo" /></div>
    <div class="input-row">
      <div class="input-group"><label>OPEN時間</label><input id="f-open" type="time" /></div>
      <div class="input-group"><label>START時間</label><input id="f-start" type="time" /></div>
    </div>
    <div class="input-row">
      <div class="input-group"><label>チケット代 (円)</label><input id="f-tprice" type="number" placeholder="0" min="0" /></div>
      <div class="input-group"><label>ドリンク代 (円)</label><input id="f-dprice" type="number" placeholder="0" min="0" /></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-live')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveLive()">保存する</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD TICKET -->
<div class="modal-overlay" id="modal-ticket">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">🎫 チケットを追加</div>
    <div class="input-group"><label>チケット番号 ✦</label><input id="f-tno" placeholder="例：A1" /></div>
    <div style="margin-bottom:10px;">
      <div class="sec-label">まとめて追加（改行で複数入力）</div>
      <textarea id="f-tno-bulk" placeholder="A1&#10;A2&#10;B1&#10;B2"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-ticket')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveTicket()">追加する</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD/EDIT PERSON -->
<div class="modal-overlay" id="modal-person">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-person-title">👤 招待者を追加</div>
    <div class="input-group"><label>名前 ✦</label><input id="f-pname" placeholder="例：田中さん" /></div>
    <div class="input-group">
      <label>チケット番号（タップで選択）</label>
      <div id="f-chips" style="padding:4px 0; min-height:36px;"></div>
    </div>
    <div class="input-group">
      <label>支払いタイプ</label>
      <select id="f-paytype">
        <option value="both">チケット代 ＋ ドリンク代</option>
        <option value="ticket">チケット代のみ</option>
        <option value="drink">ドリンク代のみ</option>
        <option value="none">なし（無料招待）</option>
      </select>
    </div>
    <div class="input-group"><label>追加費用 (円)</label><input id="f-extra" type="number" placeholder="0" min="0" /></div>
    <div class="input-group"><label>メモ</label><input id="f-memo" placeholder="備考など..." /></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-person')">キャンセル</button>
      <button class="btn btn-primary" onclick="savePerson()">保存する</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'live_manager_v1';
let state = { lives: [] };
let currentLiveId = null;
let editPersonId = null;
let editLiveId = null;

function load() {
  try { const d = localStorage.getItem(STORAGE_KEY); if (d) state = JSON.parse(d); } catch(e) {}
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
function currentLive() { return state.lives.find(l => l.id === currentLiveId); }

// ========== LIVE LIST ==========
function renderLivesList() {
  const el = document.getElementById('lives-list');
  if (!state.lives.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🎤</div><div class="empty-text">ライブを追加して管理を始めよう！</div></div>';
    return;
  }
  el.innerHTML = state.lives.map(l => {
    const unassigned = l.tickets.filter(t => !t.assignedTo).length;
    const priceStr = l.ticketPrice ? `¥${fmt(l.ticketPrice)}` : '';
    return `<div class="live-item" onclick="openLive('${l.id}')">
      <div class="row-flex">
        <div style="flex:1;min-width:0;">
          <div class="live-name">${esc(l.name)}</div>
          ${l.venue ? `<div class="live-venue">📍 ${esc(l.venue)}</div>` : ''}
          <div class="live-badges">
            ${l.open ? `<span class="badge badge-teal">OPEN ${l.open}</span>` : ''}
            ${l.start ? `<span class="badge badge-pink">START ${l.start}</span>` : ''}
            ${priceStr ? `<span class="badge badge-purple">${priceStr}</span>` : ''}
            <span class="badge badge-yellow">🎫 ${l.tickets.length}枚</span>
            ${unassigned ? `<span class="badge badge-red">未割当 ${unassigned}</span>` : ''}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;margin-left:8px;">
          <button class="btn btn-sm" style="font-size:12px;padding:5px 12px;" onclick="openEditLive('${l.id}',event)">編集</button>
          <button class="btn btn-danger-sm" style="font-size:12px;padding:5px 12px;" onclick="deleteLive('${l.id}',event)">削除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openAddLive() {
  editLiveId = null;
  document.getElementById('modal-live-title').textContent = '🎤 ライブを登録';
  ['f-name','f-venue','f-open','f-start','f-tprice','f-dprice'].forEach(id => document.getElementById(id).value = '');
  openModal('modal-live');
}

function openEditLive(id, e) {
  e.stopPropagation();
  editLiveId = id;
  const l = state.lives.find(x => x.id === id);
  document.getElementById('modal-live-title').textContent = '✏️ ライブを編集';
  document.getElementById('f-name').value = l.name;
  document.getElementById('f-venue').value = l.venue || '';
  document.getElementById('f-open').value = l.open || '';
  document.getElementById('f-start').value = l.start || '';
  document.getElementById('f-tprice').value = l.ticketPrice || '';
  document.getElementById('f-dprice').value = l.drinkPrice || '';
  openModal('modal-live');
}

function saveLive() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('ライブ名を入力してください'); return; }
  if (editLiveId) {
    const l = state.lives.find(x => x.id === editLiveId);
    l.name = name;
    l.venue = document.getElementById('f-venue').value.trim();
    l.open = document.getElementById('f-open').value;
    l.start = document.getElementById('f-start').value;
    l.ticketPrice = parseFloat(document.getElementById('f-tprice').value) || 0;
    l.drinkPrice = parseFloat(document.getElementById('f-dprice').value) || 0;
  } else {
    state.lives.unshift({
      id: genId(), name,
      venue: document.getElementById('f-venue').value.trim(),
      open: document.getElementById('f-open').value,
      start: document.getElementById('f-start').value,
      ticketPrice: parseFloat(document.getElementById('f-tprice').value) || 0,
      drinkPrice: parseFloat(document.getElementById('f-dprice').value) || 0,
      tickets: [], persons: []
    });
  }
  save(); closeModal('modal-live'); renderLivesList();
}

function deleteLive(id, e) {
  e.stopPropagation();
  if (!confirm('このライブを削除しますか？\n（チケット・招待者データもすべて消えます）')) return;
  state.lives = state.lives.filter(l => l.id !== id);
  save(); renderLivesList();
}

// ========== DETAIL ==========
function openLive(id) {
  currentLiveId = id;
  const l = currentLive();
  document.getElementById('dh-name').textContent = l.name;
  const parts = [l.venue && '📍'+l.venue, l.open && 'OPEN '+l.open, l.start && 'START '+l.start].filter(Boolean);
  document.getElementById('dh-info').textContent = parts.join(' · ');
  document.getElementById('view-list').classList.add('hidden');
  document.getElementById('view-detail').classList.remove('hidden');
  switchTab('tickets', document.querySelector('[data-tab="tickets"]'));
}

function showList() {
  document.getElementById('view-list').classList.remove('hidden');
  document.getElementById('view-detail').classList.add('hidden');
  renderLivesList();
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['tickets','invite','summary'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('hidden', t !== name);
  });
  if (name === 'tickets') renderTickets();
  if (name === 'invite') renderInvite();
  if (name === 'summary') renderSummary();
}

// ========== TICKETS ==========
function renderTickets() {
  const l = currentLive();
  const ua = l.tickets.filter(t => !t.assignedTo);
  const as = l.tickets.filter(t => t.assignedTo);
  let html = `<div class="row-flex" style="margin-bottom:14px;">
    <div style="font-size:16px;font-weight:800;">チケット一覧</div>
    <button class="btn btn-sm" onclick="openModal('modal-ticket')">＋ 追加</button>
  </div>`;
  if (!l.tickets.length) {
    html += '<div class="empty"><div class="empty-icon">🎫</div><div class="empty-text">チケットを追加しましょう</div></div>';
  } else {
    if (ua.length) {
      html += `<div class="sec-label">未割当 (${ua.length}枚)</div><div style="display:flex;flex-wrap:wrap;">`;
      html += ua.map(t => `<span class="ticket-pill ticket-unassigned">🎫 ${esc(t.no)}<button class="ticket-del" onclick="deleteTicket('${t.id}')">×</button></span>`).join('');
      html += '</div>';
    }
    if (as.length) {
      html += `<div class="sec-label" style="margin-top:14px;">割当済 (${as.length}枚)</div><div style="display:flex;flex-wrap:wrap;">`;
      html += as.map(t => {
        const p = l.persons.find(x => x.id === t.assignedTo);
        return `<span class="ticket-pill ticket-assigned">✓ ${esc(t.no)}${p ? ' → '+esc(p.name) : ''}</span>`;
      }).join('');
      html += '</div>';
    }
  }
  document.getElementById('tab-tickets').innerHTML = html;
}

function saveTicket() {
  const l = currentLive();
  const single = document.getElementById('f-tno').value.trim();
  const bulk = document.getElementById('f-tno-bulk').value.trim();
  const nos = [];
  if (single) nos.push(single);
  if (bulk) bulk.split('\n').map(s => s.trim()).filter(Boolean).forEach(s => nos.push(s));
  if (!nos.length) { alert('チケット番号を入力してください'); return; }
  let dups = [];
  nos.forEach(no => {
    if (l.tickets.find(t => t.no === no)) { dups.push(no); }
    else l.tickets.push({ id: genId(), no, assignedTo: null });
  });
  if (dups.length) alert(`以下は重複のため追加しませんでした:\n${dups.join(', ')}`);
  save(); closeModal('modal-ticket');
  document.getElementById('f-tno').value = '';
  document.getElementById('f-tno-bulk').value = '';
  renderTickets();
}

function deleteTicket(id) {
  const l = currentLive();
  const t = l.tickets.find(x => x.id === id);
  if (t && t.assignedTo) { alert('割当済のチケットは削除できません'); return; }
  if (!confirm('このチケットを削除しますか？')) return;
  l.tickets = l.tickets.filter(x => x.id !== id);
  save(); renderTickets();
}

// ========== PERSONS ==========
function renderInvite() {
  const l = currentLive();
  let html = `<div class="row-flex" style="margin-bottom:14px;">
    <div style="font-size:16px;font-weight:800;">招待者一覧</div>
    <button class="btn btn-sm" onclick="openAddPerson()">＋ 追加</button>
  </div>`;
  if (!l.persons.length) {
    html += '<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">招待する人を追加しましょう</div></div>';
  } else {
    html += l.persons.map(p => {
      const myTix = l.tickets.filter(t => t.assignedTo === p.id);
      const cost = calcCost(p, myTix.length, l);
      const ptLabel = {'both':'チケ＋ドリ','ticket':'チケのみ','drink':'ドリのみ','none':'無料'}[p.payType];
      return `<div class="person-card">
        <div class="row-flex" style="margin-bottom:8px;">
          <div class="person-name">👤 ${esc(p.name)}</div>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-sm" style="font-size:11px;padding:4px 10px;" onclick="openEditPerson('${p.id}')">編集</button>
            <button class="btn btn-danger-sm" style="font-size:11px;padding:4px 10px;" onclick="deletePerson('${p.id}')">削除</button>
          </div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;">
          ${myTix.map(t => `<span class="badge badge-teal">🎫 ${esc(t.no)}</span>`).join('') || '<span style="font-size:12px;color:var(--muted);">チケットなし</span>'}
        </div>
        <div style="font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:10px;">
          <span>💳 ${ptLabel}</span>
          <span>🎟 ${myTix.length}枚</span>
          ${p.extra ? `<span>＋追加費用 ¥${fmt(p.extra)}</span>` : ''}
          ${p.memo ? `<span>📝 ${esc(p.memo)}</span>` : ''}
        </div>
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;align-items:center;gap:6px;">
          <span style="font-size:12px;color:var(--muted);">合計</span>
          <span style="font-size:20px;font-weight:800;color:var(--purple-dark);">¥${fmt(cost)}</span>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('tab-invite').innerHTML = html;
}

function openAddPerson() {
  editPersonId = null;
  document.getElementById('modal-person-title').textContent = '👤 招待者を追加';
  document.getElementById('f-pname').value = '';
  document.getElementById('f-paytype').value = 'both';
  document.getElementById('f-extra').value = '';
  document.getElementById('f-memo').value = '';
  renderChips(null);
  openModal('modal-person');
}

function openEditPerson(id) {
  editPersonId = id;
  const l = currentLive();
  const p = l.persons.find(x => x.id === id);
  document.getElementById('modal-person-title').textContent = '✏️ 招待者を編集';
  document.getElementById('f-pname').value = p.name;
  document.getElementById('f-paytype').value = p.payType;
  document.getElementById('f-extra').value = p.extra || '';
  document.getElementById('f-memo').value = p.memo || '';
  renderChips(id);
  openModal('modal-person');
}

function renderChips(personId) {
  const l = currentLive();
  const mine = personId ? l.tickets.filter(t => t.assignedTo === personId).map(t => t.id) : [];
  const avail = l.tickets.filter(t => !t.assignedTo || (personId && t.assignedTo === personId));
  const el = document.getElementById('f-chips');
  if (!avail.length) {
    el.innerHTML = '<span style="font-size:12px;color:var(--muted);">利用可能なチケットがありません</span>';
    return;
  }
  el.innerHTML = avail.map(t =>
    `<span class="chip ${mine.includes(t.id) ? 'selected' : ''}" data-tid="${t.id}" onclick="this.classList.toggle('selected')">${esc(t.no)}</span>`
  ).join('');
}

function savePerson() {
  const name = document.getElementById('f-pname').value.trim();
  if (!name) { alert('名前を入力してください'); return; }
  const l = currentLive();
  const selectedTids = [...document.querySelectorAll('#f-chips .chip.selected')].map(c => c.dataset.tid);
  const payType = document.getElementById('f-paytype').value;
  const extra = parseFloat(document.getElementById('f-extra').value) || 0;
  const memo = document.getElementById('f-memo').value.trim();
  if (editPersonId) {
    l.tickets.forEach(t => { if (t.assignedTo === editPersonId) t.assignedTo = null; });
    const p = l.persons.find(x => x.id === editPersonId);
    Object.assign(p, { name, payType, extra, memo });
    selectedTids.forEach(tid => { const t = l.tickets.find(x => x.id === tid); if (t) t.assignedTo = p.id; });
  } else {
    const p = { id: genId(), name, payType, extra, memo };
    l.persons.push(p);
    selectedTids.forEach(tid => { const t = l.tickets.find(x => x.id === tid); if (t) t.assignedTo = p.id; });
  }
  save(); closeModal('modal-person'); renderInvite();
}

function deletePerson(id) {
  if (!confirm('この招待者を削除しますか？\n（チケット割り当ても解除されます）')) return;
  const l = currentLive();
  l.tickets.forEach(t => { if (t.assignedTo === id) t.assignedTo = null; });
  l.persons = l.persons.filter(p => p.id !== id);
  save(); renderInvite();
}

// ========== SUMMARY ==========
function calcCost(p, count, l) {
  let c = 0;
  if (p.payType === 'both') c = count * l.ticketPrice + count * l.drinkPrice;
  else if (p.payType === 'ticket') c = count * l.ticketPrice;
  else if (p.payType === 'drink') c = count * l.drinkPrice;
  return c + (p.extra || 0);
}

function renderSummary() {
  const l = currentLive();
  let tTicket=0, tDrink=0, tExtra=0, tCount=0;
  l.persons.forEach(p => {
    const n = l.tickets.filter(t => t.assignedTo === p.id).length;
    tCount += n;
    if (p.payType==='both'||p.payType==='ticket') tTicket += n * l.ticketPrice;
    if (p.payType==='both'||p.payType==='drink')  tDrink  += n * l.drinkPrice;
    tExtra += (p.extra||0);
  });
  const grand = tTicket + tDrink + tExtra;
  const unassigned = l.tickets.filter(t => !t.assignedTo).length;

  const rows = l.persons.length ? l.persons.map(p => {
    const myTix = l.tickets.filter(t => t.assignedTo === p.id);
    const cost = calcCost(p, myTix.length, l);
    const ptLabel = {'both':'チケ＋ドリ','ticket':'チケのみ','drink':'ドリのみ','none':'無料'}[p.payType];
    return `<div class="summary-row">
      <div>
        <div style="font-size:14px;font-weight:800;">${esc(p.name)}</div>
        <div style="font-size:11px;color:var(--muted);">${myTix.map(t=>esc(t.no)).join(', ')||'チケなし'} · ${ptLabel} · ${myTix.length}枚</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:17px;font-weight:800;color:var(--purple-dark);">¥${fmt(cost)}</div>
      </div>
    </div>`;
  }).join('') : '';

  document.getElementById('tab-summary').innerHTML = `
    <div style="font-size:16px;font-weight:800;margin-bottom:13px;">全体集計</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">総チケット枚数</div><div class="stat-val">${tCount}<span style="font-size:14px;">枚</span></div></div>
      <div class="stat-card"><div class="stat-label">未割当</div><div class="stat-val" style="color:var(--yellow);">${unassigned}<span style="font-size:14px;">枚</span></div></div>
    </div>
    <div class="stat-grid" style="margin-top:10px;">
      <div class="stat-card"><div class="stat-label">総チケット代</div><div class="stat-val" style="color:var(--pink-dark);">¥${fmt(tTicket)}</div></div>
      <div class="stat-card"><div class="stat-label">総ドリンク代</div><div class="stat-val" style="color:var(--teal-dark);">¥${fmt(tDrink)}</div></div>
    </div>
    <div class="stat-grid" style="margin-top:10px;">
      <div class="stat-card"><div class="stat-label">総追加費用</div><div class="stat-val" style="color:var(--purple-dark);">¥${fmt(tExtra)}</div></div>
    </div>
    <div class="total-box">
      <div class="total-label">✨ 総合計</div>
      <div class="total-val">¥${fmt(grand)}</div>
    </div>
    ${rows ? `<div style="font-size:14px;font-weight:800;margin:18px 0 8px;">招待者別内訳</div><div class="card" style="padding:4px 14px;">${rows}</div>` : ''}
  `;
}

// ========== MODAL ==========
function openModal(id) {
  const el = document.getElementById(id);
  el.classList.remove('hidden');
  requestAnimationFrame(() => el.classList.add('open'));
}
function closeModal(id) {
  const el = document.getElementById(id);
  el.classList.remove('open');
  setTimeout(() => el.classList.add('hidden'), 220);
}
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); });
});

// ========== UTILS ==========
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// INIT
load();
renderLivesList();
</script>
</body>
</html>
